<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>OMECARE Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #181c23;
    --border: #1e2330;
    --border2: #252c3a;
    --accent: #00d4ff;
    --accent2: #0066ff;
    --accent-dim: rgba(0,212,255,0.08);
    --green: #00e87a;
    --orange: #ff8c00;
    --red: #ff3b5c;
    --text: #e8edf5;
    --text2: #8892a4;
    --text3: #4a5568;
    --radius: 10px;
    --font-ui: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --sb: env(safe-area-inset-bottom, 0px);
    --st: env(safe-area-inset-top, 0px);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: fixed;
    width: 100%;
    top: 0; left: 0;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    padding-top: max(10px, var(--st));
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 8px;
    z-index: 10;
  }

  .logo { display:flex; align-items:center; gap:10px; min-width:0; }

  .logo-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-ui); font-weight: 800; font-size: 11px; color: #fff;
    flex-shrink: 0;
  }

  .logo-text { font-family:var(--font-ui); font-weight:700; font-size:13px; color:var(--text); }
  .logo-sub { font-size:9px; color:var(--text3); letter-spacing:.12em; text-transform:uppercase; }

  .header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }

  .status-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--green); box-shadow:0 0 6px var(--green);
    animation:pulse-dot 2s infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }

  .btn-icon {
    background:transparent; border:1px solid var(--border2); color:var(--text3);
    width:30px; height:30px; border-radius:7px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:14px;
    transition:all .15s;
  }
  .btn-icon:active { background:var(--surface2); color:var(--text2); }

  /* DRAWER */
  .overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.6);
    z-index:50; opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .overlay.open { opacity:1; pointer-events:all; }

  .drawer {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--surface); border-top:1px solid var(--border2);
    border-radius:16px 16px 0 0; z-index:51;
    transform:translateY(100%);
    transition:transform .3s cubic-bezier(.32,.72,0,1);
    max-height:82dvh; display:flex; flex-direction:column;
    padding-bottom:max(16px, var(--sb));
  }
  .drawer.open { transform:translateY(0); }

  .drawer-handle {
    width:36px; height:4px; background:var(--border2);
    border-radius:2px; margin:12px auto 0; flex-shrink:0;
  }

  .drawer-title {
    font-family:var(--font-ui); font-weight:700; font-size:15px;
    color:var(--text); padding:12px 20px 8px; flex-shrink:0;
  }

  .drawer-body { overflow-y:auto; padding:0 12px 8px; -webkit-overflow-scrolling:touch; }

  .section-label {
    font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--text3);
    padding:10px 8px 5px; border-bottom:1px solid var(--border); margin-bottom:3px;
  }

  .sug-btn {
    width:100%; text-align:left; background:transparent; border:1px solid transparent;
    color:var(--text2); font-family:var(--font-mono); font-size:13px; line-height:1.45;
    padding:11px 10px; border-radius:8px; cursor:pointer;
    display:flex; align-items:center; gap:10px; -webkit-appearance:none;
    transition:all .1s;
  }
  .sug-btn:active { background:var(--accent-dim); border-color:rgba(0,212,255,.2); color:var(--text); }
  .sug-icon { font-size:15px; flex-shrink:0; }

  /* CHAT */
  .chat { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }

  .msgs {
    flex:1; overflow-y:auto; padding:14px;
    display:flex; flex-direction:column; gap:14px;
    -webkit-overflow-scrolling:touch; scroll-behavior:smooth;
    overscroll-behavior:contain;
  }
  .msgs::-webkit-scrollbar { display:none; }

  /* WELCOME */
  .welcome {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    flex:1; gap:9px; padding:20px; text-align:center;
    opacity:0; animation:fadeIn .4s .2s forwards; min-height:180px;
  }
  @keyframes fadeIn { to{opacity:1} }

  .welcome-icon {
    width:50px; height:50px;
    background:linear-gradient(135deg,rgba(0,102,255,.2),rgba(0,212,255,.2));
    border:1px solid rgba(0,212,255,.3); border-radius:14px;
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .welcome h2 { font-family:var(--font-ui); font-size:17px; font-weight:700; }
  .welcome p { font-size:12px; color:var(--text3); line-height:1.7; max-width:270px; }

  .chips { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:4px; }
  .chip {
    background:var(--surface2); border:1px solid var(--border2); color:var(--text2);
    font-family:var(--font-mono); font-size:11px; padding:6px 12px;
    border-radius:20px; cursor:pointer; -webkit-appearance:none;
  }
  .chip:active { background:var(--accent-dim); border-color:rgba(0,212,255,.3); color:var(--accent); }

  /* MESSAGES */
  .msg { display:flex; gap:10px; opacity:0; animation:slideUp .2s forwards; }
  @keyframes slideUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .avatar {
    width:27px; height:27px; border-radius:7px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; margin-top:2px; font-family:var(--font-ui);
  }
  .msg.user .avatar { background:linear-gradient(135deg,#1a2035,#252c3a); border:1px solid var(--border2); color:var(--text2); }
  .msg.assistant .avatar { background:linear-gradient(135deg,rgba(0,102,255,.3),rgba(0,212,255,.3)); border:1px solid rgba(0,212,255,.4); color:var(--accent); }

  .msg-body { flex:1; min-width:0; }

  .msg-meta { font-size:9px; color:var(--text3); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
  .msg-role { font-weight:500; letter-spacing:.05em; text-transform:uppercase; font-size:9px; }
  .msg.user .msg-role { color:var(--text3); }
  .msg.assistant .msg-role { color:var(--accent); }

  .bubble {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:11px 13px;
    font-size:13px; line-height:1.75; color:var(--text); word-break:break-word;
  }
  .msg.user .bubble { background:var(--surface2); border-color:var(--border2); color:var(--text2); }
  .msg.assistant .bubble { border-color:rgba(0,212,255,.12); }

  .bubble h1,.bubble h2,.bubble h3 { font-family:var(--font-ui); font-weight:700; margin:12px 0 5px; }
  .bubble h1 { font-size:15px; }
  .bubble h2 { font-size:14px; color:var(--accent); }
  .bubble h3 { font-size:13px; color:var(--text2); font-weight:600; }
  .bubble p { margin-bottom:5px; }
  .bubble strong { color:var(--text); font-weight:600; }
  .bubble em { color:var(--text2); font-style:italic; }
  .bubble ul,.bubble ol { padding-left:16px; margin:5px 0; }
  .bubble li { margin-bottom:3px; }
  .bubble code {
    background:rgba(0,212,255,.08); border:1px solid rgba(0,212,255,.15);
    padding:1px 5px; border-radius:4px; font-size:11px; color:var(--accent);
    font-family:var(--font-mono);
  }
  .bubble pre {
    background:#0d1017; border:1px solid var(--border2); border-radius:7px;
    padding:11px; overflow-x:auto; margin:7px 0; -webkit-overflow-scrolling:touch;
  }
  .bubble pre code { background:transparent; border:none; padding:0; color:var(--text2); font-size:11px; }
  .bubble table { border-collapse:collapse; margin:7px 0; font-size:11px; display:block; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .bubble th { background:var(--surface2); border:1px solid var(--border2); padding:5px 9px; text-align:left; color:var(--accent); font-family:var(--font-ui); font-weight:600; font-size:10px; text-transform:uppercase; white-space:nowrap; }
  .bubble td { border:1px solid var(--border); padding:5px 9px; color:var(--text2); white-space:nowrap; }
  .bubble blockquote { border-left:3px solid var(--accent2); padding-left:10px; color:var(--text2); margin:7px 0; font-style:italic; }

  /* TYPING */
  .typing { display:flex; gap:10px; opacity:0; animation:fadeIn .2s .1s forwards; }
  .typing-dots {
    background:var(--surface); border:1px solid rgba(0,212,255,.12);
    border-radius:var(--radius); padding:13px 15px;
    display:flex; align-items:center; gap:5px;
  }
  .typing-dots span {
    width:5px; height:5px; border-radius:50%; background:var(--accent); opacity:.3;
    animation:blink 1.2s infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:.2s}
  .typing-dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}

  /* CONFIG BANNER */
  .config-banner {
    background:rgba(255,140,0,.08); border-top:1px solid rgba(255,140,0,.25);
    padding:9px 14px; display:flex; align-items:center; gap:8px;
    font-size:11px; color:var(--orange); font-family:var(--font-mono); flex-shrink:0;
  }
  .config-banner input {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-family:var(--font-mono); font-size:11px;
    border-bottom:1px solid var(--border2); padding:2px 4px; min-width:0;
  }
  .config-banner input::placeholder { color:var(--text3); }
  .btn-save {
    background:rgba(255,140,0,.15); border:1px solid rgba(255,140,0,.3);
    color:var(--orange); font-family:var(--font-mono); font-size:10px;
    padding:5px 10px; border-radius:5px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  }

  /* INPUT */
  .input-zone {
    padding:10px 12px;
    padding-bottom:max(10px, var(--sb));
    border-top:1px solid var(--border); background:var(--surface); flex-shrink:0;
  }
  .input-wrap {
    display:flex; align-items:flex-end; gap:8px;
    background:var(--surface2); border:1px solid var(--border2);
    border-radius:12px; padding:4px 4px 4px 12px; transition:border-color .15s;
  }
  .input-wrap:focus-within { border-color:rgba(0,212,255,.35); }
  #input {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-family:var(--font-mono); font-size:15px; line-height:1.5;
    resize:none; min-height:36px; max-height:110px; padding:7px 0; -webkit-appearance:none;
  }
  #input::placeholder { color:var(--text3); }
  #send-btn {
    width:36px; height:36px;
    background:linear-gradient(135deg,var(--accent2),var(--accent));
    border:none; border-radius:8px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  #send-btn:active { opacity:.8; }
  #send-btn:disabled { opacity:.3; cursor:not-allowed; }
  #send-btn svg { width:15px; height:15px; fill:white; }

  .toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    font-family:var(--font-mono); font-size:11px; padding:8px 16px;
    border-radius:20px; z-index:9999; white-space:nowrap;
    animation:fadeIn .2s forwards;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">OM</div>
    <div>
      <div class="logo-text">OMECARE ANALYTIC</div>
      <div class="logo-sub">Temps réel · Postgres</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <button class="btn-icon" onclick="toggleDrawer()">☰</button>
    <button class="btn-icon" onclick="clearChat()">↺</button>
  </div>
</header>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">Questions rapides</div>
  <div class="drawer-body">

    <div class="section-label">Médecins</div>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">👨‍⚕️</span>Quels médecins ont le plus de créneaux ce mois ?</button>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">📉</span>Qui est en décrochage et doit être relancé en priorité ?</button>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">📅</span>Combien de créneaux à venir par médecin dans les 30 jours ?</button>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">🔄</span>Liste les remplaçants sans aucun créneau planifié</button>

    <div class="section-label">Cabinets</div>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">🏥</span>Quels cabinets ont un taux de remplissage inférieur à 50% ?</button>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">📊</span>Compare les honoraires par cabinet ce mois vs mois dernier</button>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">⚠️</span>Quels cabinets ont moins de 5 créneaux à venir sur 30 jours ?</button>

    <div class="section-label">Pilotage groupe</div>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">📈</span>Tendance des honoraires réseau sur les 6 derniers mois</button>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">🏆</span>Top 10 médecins sur les 3 derniers mois avec leur évolution</button>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">🔍</span>Synthèse de l'état du réseau — points critiques</button>
    <button class="sug-btn" onclick="suggest(this)"><span class="sug-icon">🚨</span>Alertes prioritaires à traiter aujourd'hui</button>

  </div>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="msgs" id="msgs">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🗄️</div>
      <h2>Assistant Analytique BDD</h2>
      <p>Accès direct à la base OMECARE. Pose tes questions sur l'activité, les créneaux et les alertes.</p>
      <div class="chips">
        <span class="chip" onclick="suggest(this)">Médecins en décrochage</span>
        <span class="chip" onclick="suggest(this)">Top remplaçants</span>
        <span class="chip" onclick="suggest(this)">Cabinets sous-chargés</span>
        <span class="chip" onclick="suggest(this)">Bilan réseau</span>
      </div>
    </div>
  </div>

  <div class="config-banner" id="config-banner">
    <span>⚙️</span>
    <input type="url" id="webhook-url" placeholder="https://…/webhook/analytic-bdd-omecare"
      inputmode="url" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <button class="btn-save" onclick="saveUrl()">OK</button>
  </div>

  <div class="input-zone">
    <div class="input-wrap">
      <textarea id="input" placeholder="Pose ta question…" rows="1"></textarea>
      <button id="send-btn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  let messages = [], isLoading = false;
  let webhookUrl = localStorage.getItem('omecare_bdd_webhook') || '';

  const urlInput = document.getElementById('webhook-url');
  const configBanner = document.getElementById('config-banner');

  configBanner.style.display = webhookUrl ? 'none' : 'flex';
  if (webhookUrl) urlInput.value = webhookUrl;

  function saveUrl() {
    webhookUrl = urlInput.value.trim();
    if (!webhookUrl) return;
    localStorage.setItem('omecare_bdd_webhook', webhookUrl);
    configBanner.style.display = 'none';
    showToast('URL sauvegardée ✓');
  }

  function toggleDrawer() {
    const d = document.getElementById('drawer'), o = document.getElementById('overlay');
    const open = d.classList.contains('open');
    d.classList.toggle('open', !open);
    o.classList.toggle('open', !open);
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }

  const input = document.getElementById('input');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 110) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function suggest(el) {
    const text = el.textContent.trim().replace(/^[\u{1F000}-\u{1FFFF}\s]+/u, '').trim();
    input.value = text;
    input.dispatchEvent(new Event('input'));
    closeDrawer();
    setTimeout(() => input.focus(), 300);
  }

  async function send() {
    const text = input.value.trim();
    if (!text || isLoading) return;
    if (!webhookUrl) {
      configBanner.style.display = 'flex';
      showToast('Configure d\'abord l\'URL', 'warn');
      return;
    }

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    messages.push({ role: 'user', content: text });
    renderMsg({ role: 'user', content: text });
    input.value = ''; input.style.height = 'auto';

    const typingEl = showTyping();
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    const container = document.getElementById('msgs');
    setTimeout(() => container.scrollTop = container.scrollHeight, 50);

    try {
      const res = await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      let reply = '';
      if (data.content && Array.isArray(data.content)) {
        reply = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
      } else if (data.text) {
        reply = data.text;
      } else if (typeof data === 'string') {
        reply = data;
      } else {
        reply = JSON.stringify(data, null, 2);
      }

      typingEl.remove();
      messages.push({ role: 'assistant', content: reply });
      renderMsg({ role: 'assistant', content: reply });
    } catch(err) {
      typingEl.remove();
      renderMsg({ role: 'assistant', content: `Erreur de connexion.\n\`${err.message}\``, error: true });
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
  }

  function renderMsg({ role, content, error }) {
    const container = document.getElementById('msgs');
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'LN' : 'AI';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const roleEl = document.createElement('span');
    roleEl.className = 'msg-role';
    roleEl.textContent = role === 'user' ? 'Leonardo' : 'Assistant BDD';
    const timeEl = document.createElement('span');
    timeEl.textContent = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    meta.appendChild(roleEl); meta.appendChild(timeEl);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (error) bubble.style.borderColor = 'rgba(255,59,92,.3)';
    bubble.innerHTML = parseMarkdown(content);

    body.appendChild(meta); body.appendChild(bubble);
    msg.appendChild(avatar); msg.appendChild(body);
    container.appendChild(msg);
    setTimeout(() => container.scrollTop = container.scrollHeight, 50);
  }

  function showTyping() {
    const container = document.getElementById('msgs');
    const el = document.createElement('div');
    el.className = 'typing';
    el.innerHTML = `<div class="avatar" style="background:linear-gradient(135deg,rgba(0,102,255,.3),rgba(0,212,255,.3));border:1px solid rgba(0,212,255,.4);color:var(--accent);">AI</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
    return el;
  }

  function parseMarkdown(text) {
    if (!text) return '';
    return text
      .replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escHtml(code.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/(\|.+\|\n)+/g, parseTable)
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border2);margin:10px 0;">')
      .replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>')
      .replace(/^(?!<[hupblo])/, '<p>').replace(/$/, '</p>')
      .replace(/<p><\/p>/g, '').replace(/<p>(<[hupblo])/g, '$1')
      .replace(/(<\/[hupblo][^>]*>)<\/p>/g, '$1');
  }

  function parseTable(match) {
    const rows = match.trim().split('\n').filter(r => r.trim());
    let html = '<table>';
    rows.forEach((row, i) => {
      if (row.match(/^\|[-| ]+\|$/)) return;
      const cells = row.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
      const tag = i === 0 ? 'th' : 'td';
      html += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
    });
    return html + '</table>';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function clearChat() {
    messages = [];
    document.getElementById('msgs').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🗄️</div>
        <h2>Assistant Analytique BDD</h2>
        <p>Accès direct à la base OMECARE. Pose tes questions sur l'activité, les créneaux et les alertes.</p>
        <div class="chips">
          <span class="chip" onclick="suggest(this)">Médecins en décrochage</span>
          <span class="chip" onclick="suggest(this)">Top remplaçants</span>
          <span class="chip" onclick="suggest(this)">Cabinets sous-chargés</span>
          <span class="chip" onclick="suggest(this)">Bilan réseau</span>
        </div>
      </div>`;
  }

  function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.cssText = `background:${type==='warn'?'rgba(255,140,0,.15)':'rgba(0,212,255,.1)'};border:1px solid ${type==='warn'?'rgba(255,140,0,.4)':'rgba(0,212,255,.3)'};color:${type==='warn'?'var(--orange)':'var(--accent)'};`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  // Éviter le zoom double-tap iOS
  let lastTap = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });
</script>
</body>
</html>
